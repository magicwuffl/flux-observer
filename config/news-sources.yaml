# News-Quellen fuer den Observer-Scraper.
# Pro Quelle:
#   name      – Anzeigename
#   category  – self | direct | technology | context  (siehe competitors.md)
#   url       – Hauptseite oder News-Listing-URL (Fallback fuer Auto-Discovery + HTML-Scrape)
#   rss       – optional: bekannter RSS/Atom-Feed. Wenn gesetzt, wird Auto-Discovery uebersprungen.
#   html      – optional: { container, item, title, link, date } CSS-Selektoren fuer HTML-Fallback,
#               wenn keine RSS-Quelle gefunden wird. Wenn leer: Heuristik (article/h2/time).
#   keywords  – optional: Stichworte fuer Titel-Filter. Wenn gesetzt, werden nur Items aufgenommen,
#               deren Titel mind. einen Match enthaelt (case-insensitive). Sonst alle.
#   max_items – optional: Cap pro Lauf (Default 10).
#
# RSS-First-Logik im Scraper:
#   1. wenn rss gesetzt: nutzen
#   2. sonst Auto-Discovery via <link rel="alternate" type="application/rss+xml">
#   3. sonst HTML-Heuristik (oder html-Selektoren wenn definiert)
#
# Stichworte sind absichtlich breit – die LLM-Filterung passiert spaeter im Agent.

# === SELF: FLUX-GERAETE GMBH (eigener Vergleichspunkt) ===

- name: FLUX-GERAETE GMBH (Neuigkeiten)
  slug: flux-news
  category: self
  url: https://www.flux-pumps.com/de-DE/aktuelles/neuigkeiten.html
  link_pattern: '/aktuelles/artikel/'
  keywords: []
  max_items: 15

- name: FLUX-GERAETE GMBH (Messen)
  slug: flux-messen
  category: self
  url: https://www.flux-pumps.com/de-DE/aktuelles/messen.html
  link_pattern: '/aktuelles/(messen|artikel)/'
  keywords: []
  max_items: 10

- name: FLUX LinkedIn (Pressemitteilungen via RSS-Bridge)
  slug: flux-linkedin
  category: self
  url: https://www.linkedin.com/company/flux-pumpen/posts/
  # LinkedIn liefert kein RSS; Auto-Discovery laeuft ins Leere. Wir lassen die Quelle
  # vorerst inaktiv – sobald ein RSS-Bridge-Endpunkt steht, hier eintragen.
  enabled: false

