name: Scrape competitor + FLUX news

# Laeuft Mo/Mi/Fr 06:00 UTC (08:00 MESZ / 07:00 MEZ) – damit der Scheduled Agent
# spaeter am Tag die frischen incoming/-Files findet.
# Manuell triggerbar via "Run workflow" im GitHub-UI.
on:
  schedule:
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r scrapers/requirements.txt

      - name: Run scraper
        run: python scrapers/scrape_competitors.py
        # Wir lassen das Skript bewusst durchlaufen, auch wenn einzelne Quellen
        # 0 Treffer liefern (Bot-Schutz, Listing leer). Kein --no-state.

      - name: Commit + push (nur wenn neue Items vorhanden)
        run: |
          set -e
          git config user.name "observer-scraper"
          git config user.email "observer-scraper@flux-pumps.local"

          if [ -n "$(git status --porcelain incoming state)" ]; then
            COUNT=$(find incoming -name '*.json' -newer state -type f 2>/dev/null | wc -l | tr -d ' ')
            git add incoming state
            git commit -m "scrape: $(date +%Y-%m-%d) Wettbewerber + FLUX News-Items"
            git push
            echo "✓ commit + push (neue Items)"
          else
            echo "Keine Aenderungen – kein Commit."
          fi
